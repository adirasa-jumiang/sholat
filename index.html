<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animasi Gerakan Sholat 2D</title>
  <link rel="icon" type="image/png" href="https://github.com/adirasa-jumiang/rapor-ra/blob/main/ADIRASA.png?raw=true">
  <style>
    body {
  margin: 0;
  background: #111;
  color: #fff;
  text-align: center;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Judul kecil saja */
h1 {
  font-size: 18px;
  margin: 5px 0;
}

/* Gambar fleksibel */
#char {
  max-height: 30vh;
  object-fit: contain;
  margin: auto;
}

/* Controls jadi grid biar rapi */
.controls {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 5px;
  max-height: 25vh;
  overflow-y: auto;
}

button {
  padding: 8px;
  font-size: 12px;
  background: #28a745;
  color: white;
  cursor: pointer;
}
button:hover {
      background: #218838;
}

/* Text box fleksibel */
.text-box {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  flex: 1;
  overflow-y: auto;
}

.arabic {
  font-size: 25px;
  font-family: 'Scheherazade', serif;
}

.arti {
  font-size: 13px;
}
</style>
</head>
<body>
  <h1>Gerakan Sholat dan Bacaan</h1>

  <!-- Gambar karakter -->
  <img id="char" src="niat.JPG" alt="Gerakan Sholat">

  <!-- Tombol kontrol -->
  <div class="controls">
    <button onclick="setPose('niat')">Niat</button>
    <button onclick="setPose('takbir')">Takbiratul Ihram</button>
    <button onclick="setPose('iftitah')">Do'a iftitah</button>
    <button onclick="setPose('fatihah')">Al-Fatihah</button>
    <button onclick="setPose('rukuk')">Rukuk</button>
    <button onclick="setPose('itidal')">I'tidal</button>
    <button onclick="setPose('sujud')">Sujud</button>
    <button onclick="setPose('duduk')">Duduk Iftirasy</button>
    <button onclick="setPose('berdiri')">Berdiri Kembali</button>
    <button onclick="setPose('qunut')">Qunut</button>
    <button onclick="setPose('tasyahudA')">Tasyahud Awal</button>
    <button onclick="setPose('tasyahudB')">Tasyahud Akhir</button>
    <button onclick="setPose('salam')">Salam</button>
    <button onclick="startAuto()">▶ Mode Otomatis</button>
  </div>

  <!-- Teks arab & artinya -->
  <div class="text-box">
    <div id="arabic" class="arabic">الله أكبر</div>
    <div id="arti" class="arti">Allah Maha Besar</div>
  </div>

  <!-- Audio player (hidden) -->
  <audio id="player"></audio>

  <script>
    // Data bacaan sholat
    const dataSholat = {
      niat: {

        arabic: "أُصَلِّيْ فَرْضُ الظُّهْرِ أَرْبَعَ رَكَعَاتٍ مُسْتَقْبِلَ الْقِبْلةِ أَدَاءً/مَأْمُوْمًا/إِمَامًا لله تَعَالَى",
        arti: "Saya berniat sholat fardu dzuhur empat rakaat menghadap kiblat karena Allah Ta'ala/Ma'mum karena Allah Ta'ala/Imam karena Allah Ta'ala.",
        audio: "niat.mp3"
      },
      takbir: {
        img: "takbiratul-ihram.JPG",
        arabic: "اَللّٰهُ اَكْبَرُ",
        arti: "Allah Maha Besar",
        audio: "takbir.mp3"
      },
      iftitah: {
        img: "iftitah.JPG",
        arabic: "اللهُ أَكْبَرُ كَبِيْراًوَالْحَمْدُ لِلَّهِ كَثِيْراً وَسُبْحَانَ اللهِ بُكْرَةً وَأَصِيْلًا اِنِّى وَجَّهْتُ وَجْهِيَ لِلَّذِيْ فَطَرَالسَّمَاوَاتِ وَالْااَرْضَ حَنِيْفًا مُسْلِمًا وَمَا اَنَا مِنَ الْمُشْرِكِيْنَ  اِنَّ صَلَاتِيْ وَنُسُكِيْ وَمَحْيَايَ وَمَمَاتِيْ لِلهِ رَبِّ الْعَا لَمِيْنَ  لاَ شَرِيْكَ لَهُ وَبِذَ لِكَ اُمِرْتُ وَاَنَ مِنَ الْمُسْلِمِيْنَ",
        arti: "Allah maha besar, maha sempurna kebesaran-Nya. Segala puji bagi Allah, pujian yang sebanyak-banyaknya. Dan maha suci Allah sepanjang pagi dan petang. Kuhadapkan wajahku kepada zat yang telah menciptakan langit dan bumi dengan penuh ketulusan dan kepasrahan dan aku bukanlah termasuk orang-orang yang musyrik. Sesungguhnya sholatku, ibadahku, hidupku dan matiku semuanya untuk Allah, penguasa alam semesta. Tidak ada sekutu bagi-Nya dan dengan demikianlah aku diperintahkan dan aku termasuk orang-orang yang muslim.",
        audio: "iftitah.mp3"
      },
      fatihah: {
        img: "iftitah.JPG",
        arabic: "بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ . الْحَمْدُ لِلّٰهِ رَبِّ الْعٰلَمِينَ  .الرَّحْمٰنِ الرَّحِيْمِ . مٰلِكِ يَوْمِ الدِّيْنِ .  اِيَّاكَ نَعْبُدُ وَاِيَّاكَ نَسْتَعِيْنُ  .اِهْدِنَا الصِّرَاطَ الْمُسْتَقِيْمَ  .صِرَاطَ الَّذِينَ اَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوْبِ عَلَيْهِمْ وَلَا الضَّآلِّيْنَ ",
        arti: "Dengan nama Allah Yang Maha Pengasih lagi Maha Penyayang. Segala puji bagi Allah, Tuhan semesta alam. Yang Maha Pengasih lagi Maha Penyayang, Pemilik hari Pembalasan. Hanya kepada Engkaulah kami menyembah dan hanya kepada Engkaulah kami memohon pertolongan. Bimbinglah kami ke jalan yang lurus, (yaitu) jalan orang-orang yang telah Engkau beri nikmat, bukan (jalan) mereka yang dimurkai dan bukan (pula jalan) orang-orang yang sesat.",
        audio: "fatihah.mp3"
      },
      rukuk: {
        img: "rukuk.JPG",
        arabic: "سُبْحَانَ رَبِّىَ الْعَظِيْمِ وَبِحَمْدِهِ x۳",
        arti: "Maha Suci Rabbku yang maha Agung dan maha terpuji.",
        audio: "rukuk.mp3"
      },
      itidal: {
        img: "itidal.JPG",
        arabic: "سَمِعَ اللّهُ لِمَنْ حَمِدَهُ  رَبَّنَا لَكَ الْحَمْدُ مِلْءُ السَّمَوَاتِ وَمِلْءُ الْأَرْضِ وَمِلْءُ مَا شِئْتَ مِنْ شَيْءٍ بَعْدُ ",
        arti: "Ya Allah Tuhan Kami, Bagi-Mu lah segala puji, sepenuh langit dan bumi, dan sepenuh barang yang Kau kehendaki sesudah itu.",
        audio: "itidal.mp3"
      },
      sujud: {
        img: "sujud.JPG",
        arabic: "سُبْحَانَ رَبِّىَ الأَعْلَى وَبِحَمْدِهِ x۳",
        arti: "Mahasuci Rabbku Yang Mahatinggi dan pujian untuk-Nya (HR. Abu Daud).",
        audio: "sujud.mp3"
      },
      duduk: {
        img: "duduk-iftirasy.JPG",
        arabic: "رَبِّ اغْفِرْلِىْ وَارْحَمْنِىْ وَاجْبُرْنِىْ وَارْفَعْنِىْ وَازُقْنِىْ وَاهْدِنِىٌ وَعَا فِنِىْ وَاعْفُ عَنِّىْ",
        arti: "Ya Allah, ampunilah dosaku, rahmatilah aku, perbaikilah aku, berikanlah aku rezeki dan angkatlah derajatku.",
        audio: "duduk.mp3"
      },
      berdiri: {
        img: "berdiri-kembali.JPG",
        arabic: "اَللّٰهُ اَكْبَرُ",
        arti: "Allah Maha Besar.",
        audio: "berdiri.mp3"
      },
      qunut: {
        img: "qunut.png",
        arabic: "َ اَللّهُمَّ اهْدِنِىْ فِيْمَنْ هَدَيْتَ وَعَافِنِى فِيْمَنْ عَافَيْتَ وَتَوَلَّنِىْ فِيْمَنْ تَوَلَّيْتَ وَبَارِكْ لِىْ فِيْمَا اَعْطَيْتَ وَقِنِيْ شَرَّمَا قَضَيْتَ فَاِ نَّكَ تَقْضِىْ وَلاَ يُقْضَى عَلَيْكَ وَاِ نَّهُ لاَ يَذِلُّ مَنْ وَالَيْتَ وَلاَ يَعِزُّ مَنْ عَادَيْتَ تَبَارَكْتَ رَبَّنَا وَتَعَالَيْتَ فَلَكَ الْحَمْدُ عَلَى مَا قَضَيْتَ وَاَسْتَغْفِرُكَ وَاَتُوْبُ اِلَيْكَ وَصَلَّى اللهُ عَلَى سَيِّدَنَا مُحَمَّدٍ النَّبِيِّ اْلاُمِّيِّ وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمَ",
        arti: "Ya Allah, berilah aku petunjuk bersama orang-orang yang telah Engkau beri petunjuk. Berilah aku kesehatan bersama orang-orang yang telah Engkau beri kesehatan. Pimpinlah aku bersama orang-orang yang telah Engkau pimpin. Berkahilah untukku apa yang telah Engkau berikan. Lindungilah aku dari keburukan yang telah Engkau tetapkan. Karena sesungguhnya Engkaulah yang menetapkan, dan tidak ada yang menetapkan atas-Mu. Tidak akan hina orang yang Engkau pimpin, dan tidak akan mulia orang yang Engkau musuhi. Mahasuci Engkau, wahai Tuhan kami, dan Mahatinggi Engkau. Segala puji bagi-Mu atas segala ketetapan-Mu. Kami memohon ampun kepada-Mu dan bertobat kepada-Mu. Semoga Allah mencurahkan rahmat dan keselamatan kepada junjungan kami Nabi Muhammad, beserta keluarga dan sahabatnya.",
        audio: "qunut.mp3"
      },
      tasyahudA: {
        img: "tasyahud-awal.JPG",
        arabic: "التَّحِيَّاتُ الْمُبَارَكَاتُ الصَّلَوَاتُ الطَّيِّبَاتُ لِلَّهِ السَّلَامُ عَلَيْك أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ, أَشْهَدُ أَنْ لَا إلَهَ إلَّا اللَّهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللهِ, اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ",
        arti: "Segala kehormatan, dan keberkahan, kebahagiaan dan kebaikan itu punya Allah. Keselamatan atas Nabi Muhammad, juga rahmat dan berkahnya. Keselamatan dicurahkan kepada kami dan atas seluruh hamba Allah yang sholeh. Aku bersaksi tidak ada sesembahan yang berhak disembah kecuali Allah. Dan aku bersaksi bahwa Nabi Muhammad adalah utusan Allah. Ya Allah, limpahkanlah rahmat kepada Nabi Muhammad.",
        audio: "tasyahud-awal.mp3"
      },
      tasyahudB: {
        img: "tasyahud-akhir.JPG",
        arabic: "التَّحِيَّاتُ الْمُبَارَكَاتُ الصَّلَوَاتُ الطَّيِّبَاتُ لِلَّهِ السَّلَامُ عَلَيْك أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ, أَشْهَدُ أَنْ لَا إلَهَ إلَّا اللَّهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللهِ, اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ . وَعَلَى آلِ مُحَمَّدٍ، كَمَا صَلَّيْتَ عَلٰى سَيِّدِ نَا إِبْرَاهِيمَ وَعَلٰى آلِ سَيِّدِ نَا إِبْرَاهِيمَ، وَ بَارِكْ عَلٰى مُحَمَّدٍ  وَعَلَى آلِ  سَيِّدِ نَا مُحَمَّدٍ كَمَا بَارَكْتَ عَلٰى سَيِّدِ نَا إِبْرَاهِيمَ ، وَعَلٰى آلِ  سَيِّدِ نَا إِبْرَاهِيمَ،  فِى الْعَا لَمِيْنَ إِنَّكَ حَمِيدٌ مَجِيدٌ",
        arti: "Segala kehormatan, dan keberkahan, kebahagiaan dan kebaikan itu punya Allah. Keselamatan atas Nabi Muhammad, juga rahmat dan berkahnya. Keselamatan dicurahkan kepada kami dan atas seluruh hamba Allah yang sholeh. Aku bersaksi tidak ada sesembahan yang berhak disembah kecuali Allah. Dan aku bersaksi bahwa Nabi Muhammad adalah utusan Allah. Ya Allah, limpahkanlah rahmat kepada Nabi Muhammad. Ya Allah. Limpahilah rahmat atas keluarga Nabi Muhammad. Sebagaimana pernah Engkau beri rahmat kepada Nabi Ibrahim dan keluarganya. Dan limpahilah berkah atas Nabi Muhammad beserta para keluarganya. Sebagaimana Engkau memberi berkah kepada Nabi Ibrahim dan keluarganya. Diseluruh alam semesta Engkaulah yang terpuji, dan Maha Mulia.",
        audio: "tasyahud-akhir.mp3"
      },
      salam: {
        img: "salam.JPG",
        arabic: "السَّلاَمُ عَلَيْكُمْ وَرَحْمَةُ اللهِ x۲",
        arti: "Semoga keselamatan dan rahmat Allah tercurah kepadamu",
        audio: "salam.mp3"
      }
    };

    const urutan = ["niat", "takbir", "iftitah", "fatihah", "rukuk", "itidal", "sujud", "duduk", "berdiri", "qunut", "tasyahudA", "tasyahudB", "salam"]; // urutan otomatis
    let indexAuto = 0;

    function setPose(pose) {
      let char = document.getElementById('char');
      let arabic = document.getElementById('arabic');
      let arti = document.getElementById('arti');
      let player = document.getElementById('player');

      // Update gambar
      char.src = dataSholat[pose].img;

      // Update teks arab & arti
      arabic.textContent = dataSholat[pose].arabic;
      arti.textContent = dataSholat[pose].arti;

      // Putar audio
      player.src = dataSholat[pose].audio;
      player.play();
    }

    function startAuto() {
      indexAuto = 0;
      playNext();
    }

    function playNext() {
      if (indexAuto >= urutan.length) return; // selesai
      let pose = urutan[indexAuto];
      setPose(pose);

      let player = document.getElementById('player');
      player.onended = function() {
        indexAuto++;
        playNext();
      };
    }
  </script>
</body>
</html>
